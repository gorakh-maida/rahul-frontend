<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rahul Maida - OmniMirror Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .card-hover:hover { transform: scale(1.02); transition: all 0.3s ease; }
        .gradient-bg { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
    </style>
</head>
<body class="gradient-bg text-slate-100 min-h-screen">
    <!-- Navbar -->
    <nav class="border-b border-white/10 p-4 bg-slate-900/50 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black text-blue-400 tracking-tighter">RAHUL <span class="text-white">MAIDA</span></h1>
            <div class="flex gap-4">
                <button onclick="location.reload()" class="bg-blue-500/20 text-blue-400 px-4 py-2 rounded-lg font-bold text-sm">Refresh Content</button>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto p-6">
        <header class="mb-10">
            <h2 id="page-title" class="text-3xl font-bold">Study Resources</h2>
            <p id="page-desc" class="text-slate-400">Real-time mirroring from OmniStudy</p>
            <div id="back-btn" class="mt-4 hidden">
                <button onclick="location.reload()" class="flex items-center gap-2 text-blue-400 hover:text-blue-300 font-bold">
                    <i data-lucide="arrow-left"></i> Back to All Courses
                </button>
            </div>
        </header>

        <!-- Main Grid -->
        <div id="main-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            <!-- Shimmer Loading -->
            <div class="col-span-full py-20 text-center">
                <div class="animate-spin w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full mx-auto mb-4"></div>
                <p class="text-slate-400 animate-pulse">Syncing content with OmniStudy...</p>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "https://rahul-backend-7ag5.onrender.com";
        let currentBatch = "";

        async function fetchBatches() {
            try {
                const res = await fetch(`${API_BASE}/api/batches`);
                const data = await res.json();
                renderBatches(data);
            } catch (err) {
                document.getElementById('main-grid').innerHTML = `<div class="col-span-full text-center text-red-400">Mirroring connection failed. Backend waking up?</div>`;
            }
        }

        function renderBatches(batches) {
            const grid = document.getElementById('main-grid');
            if(!batches || batches.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-20 bg-white/5 rounded-2xl border border-dashed border-white/10">No content mirrors found yet.</div>`;
                return;
            }

            grid.innerHTML = batches.map(b => `
                <div onclick="loadBatchDetails('${b.id || b.batchId}')" class="card-hover bg-slate-800/50 border border-white/5 rounded-2xl overflow-hidden cursor-pointer shadow-xl">
                    <img src="${b.image || b.batchImage}" class="h-40 w-full object-cover">
                    <div class="p-4">
                        <h3 class="font-bold text-sm h-12 line-clamp-2">${b.name || b.batchName}</h3>
                        <div class="mt-3 flex justify-between items-center text-[10px] uppercase font-bold text-blue-400">
                            <span>REPLICATED</span>
                            <i data-lucide="external-link" class="w-3 h-3"></i>
                        </div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        async function loadBatchDetails(id) {
            currentBatch = id;
            document.getElementById('main-grid').innerHTML = `<div class="col-span-full text-center py-20"><div class="animate-spin w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full mx-auto mb-4"></div></div>`;
            document.getElementById('back-btn').classList.remove('hidden');
            
            try {
                const res = await fetch(`${API_BASE}/api/details/${id}`);
                const data = await res.json();
                const subjects = data.subjects || data.data?.subjects || [];

                document.getElementById('main-grid').innerHTML = subjects.map(s => `
                    <div onclick="loadContent('${s.id}')" class="bg-slate-800 p-6 rounded-2xl border border-white/5 hover:border-blue-500 cursor-pointer flex items-center gap-4 transition-all">
                        <div class="bg-blue-500/10 p-3 rounded-lg text-blue-400"><i data-lucide="folder"></i></div>
                        <h4 class="font-bold text-sm">${s.name || s.subjectName}</h4>
                    </div>
                `).join('');
                lucide.createIcons();
            } catch (err) { alert("Detailed fetch failed"); }
        }

        // Baki content rendering logic bhi isi tarah mirror hogi..
        
        window.onload = fetchBatches;
    </script>
</body>
</html>
