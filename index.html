<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rahul Maida - Study Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #0f172a; color: white; }
        .course-card { background: #1e293b; border-radius: 12px; overflow: hidden; cursor: pointer; border: 1px solid #ffffff10; }
        .course-card:hover { border-color: #facc15; }
    </style>
</head>
<body class="min-h-screen">

    <!-- Sidebar -->
    <div class="fixed left-0 top-0 h-full w-64 bg-[#020617] hidden md:block p-6">
        <h1 class="text-2xl font-bold text-yellow-400">RAHUL MAIDA</h1>
        <nav class="mt-10">
            <button onclick="location.reload()" class="w-full text-left p-3 rounded-lg bg-yellow-400 text-black font-bold">🏠 All Batches</button>
        </nav>
    </div>

    <!-- Main -->
    <div class="md:ml-64 p-6">
        <header class="mb-10 flex justify-between items-center">
            <div>
                <h2 id="title-main" class="text-3xl font-bold">Available Batches</h2>
                <p id="sub-main" class="text-slate-400">Start your learning journey</p>
            </div>
            <div id="header-action"></div>
        </header>

        <!-- Grid Container -->
        <div id="main-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <div class="col-span-full text-center py-20">
                <p class="animate-pulse text-lg">Connecting to Rahul's Server...</p>
                <p class="text-xs text-slate-500 mt-2">Check Console (F12) for logs</p>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "https://rahul-backend-7ag5.onrender.com";

        // Helper to safely create icons
        function refreshIcons() {
            try { lucide.createIcons(); } catch(e) { console.log("Lucide error"); }
        }

        async function loadBatches() {
            console.log("STEP 1: Fetching batches from:", API_BASE);
            const grid = document.getElementById('main-grid');

            try {
                const res = await fetch(`${API_BASE}/api/batches`);
                console.log("STEP 2: Response received", res.status);
                
                const data = await res.json();
                console.log("STEP 3: Data parsed", data.length, "items found");

                if (!data || data.length === 0) {
                    grid.innerHTML = `<div class="col-span-full text-center py-10 bg-slate-800 rounded-xl">
                        <p class="mb-4">Backend is still syncing from source...</p>
                        <button onclick="loadBatches()" class="bg-yellow-400 text-black px-6 py-2 rounded-lg font-bold">RETRY NOW</button>
                    </div>`;
                    return;
                }

                grid.innerHTML = data.map(b => `
                    <div onclick="openBatch('${b.batchId}')" class="course-card group">
                        <img src="${b.batchImage}" class="w-full h-40 object-cover">
                        <div class="p-4">
                            <h3 class="font-bold text-sm h-10 line-clamp-2">${b.batchName}</h3>
                            <p class="text-yellow-400 text-[10px] mt-2 font-bold uppercase">${b.byName || 'STUDY MATERIAL'}</p>
                        </div>
                    </div>
                `).join('');
                
                refreshIcons();

            } catch (err) {
                console.error("CRITICAL ERROR:", err);
                grid.innerHTML = `<div class="col-span-full text-center py-10 bg-red-900/20 border border-red-500 rounded-xl">
                    <p class="text-red-500 font-bold">SERVER CONNECTION ERROR</p>
                    <p class="text-xs mt-2">${err.message}</p>
                    <button onclick="loadBatches()" class="mt-4 bg-white text-black px-4 py-1 rounded-md text-sm">Try Again</button>
                </div>`;
            }
        }

        async function openBatch(id) {
            console.log("Opening Batch:", id);
            document.getElementById('main-grid').innerHTML = '<p class="col-span-full text-center py-10 text-yellow-500">Loading Subjects...</p>';
            
            try {
                const res = await fetch(`${API_BASE}/api/details/${id}`);
                const response = await res.json();
                
                document.getElementById('title-main').innerHTML = "Subjects";
                document.getElementById('header-action').innerHTML = `<button onclick="location.reload()" class="text-xs bg-slate-800 p-2 rounded">← BACK</button>`;

                const grid = document.getElementById('main-grid');
                grid.innerHTML = response.data.subjects.map(s => `
                    <div onclick="openContent('${id}', '${s.subjectId}', '${s.subjectName}')" class="bg-slate-800 p-5 rounded-xl border border-white/5 hover:border-yellow-400 cursor-pointer flex items-center gap-4">
                        <div class="text-yellow-400"><i data-lucide="folder"></i></div>
                        <span class="font-bold text-sm">${s.subjectName}</span>
                    </div>
                `).join('');
                refreshIcons();
            } catch (e) { alert("Error loading subjects"); }
        }

        async function openContent(bid, sid, sname) {
            document.getElementById('main-grid').innerHTML = '<p class="col-span-full text-center py-10 text-yellow-500">Loading Content...</p>';
            try {
                const res = await fetch(`${API_BASE}/api/content/${bid}/${sid}`);
                const response = await res.json();
                
                document.getElementById('title-main').innerHTML = sname;
                document.getElementById('header-action').innerHTML = `<button onclick="openBatch('${bid}')" class="text-xs bg-slate-800 p-2 rounded">← BACK</button>`;

                const grid = document.getElementById('main-grid');
                grid.innerHTML = response.data.map(item => `
                    <div class="bg-slate-800 p-4 rounded-xl border border-white/5 flex flex-col justify-between">
                        <h4 class="text-sm font-bold mb-4 h-10 line-clamp-2">${item.title}</h4>
                        <a href="${item.url}" target="_blank" class="block w-full text-center bg-yellow-400 text-black py-2 rounded-lg font-bold text-xs uppercase">Open File</a>
                    </div>
                `).join('');
                refreshIcons();
            } catch (e) { alert("Error"); }
        }

        // Auto-run on load
        loadBatches();
    </script>
</body>
</html>
