<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rahul Maida Study Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .loader { border-top-color: #fbbf24; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-[#0f172a] text-white font-sans min-h-screen">
    <div class="flex">
        <!-- Sidebar -->
        <div class="w-64 h-screen bg-[#070a16] border-r border-white/10 fixed p-5 flex flex-col justify-between hidden md:flex">
            <div>
                <h2 class="text-2xl font-bold text-yellow-400">Rahul Maida</h2>
                <p class="text-[10px] uppercase tracking-widest text-slate-500">Official Portal</p>
                <nav class="mt-10 space-y-4">
                    <button onclick="showBatches()" class="w-full flex items-center gap-3 text-yellow-400 bg-yellow-400/10 p-3 rounded-lg hover:bg-yellow-400/20 transition">
                        <i data-lucide="layout-dashboard"></i> Batches
                    </button>
                </nav>
            </div>
            <a href="https://t.me/official_rahulmaida" target="_blank" class="bg-[#229ED9] p-3 rounded-xl flex items-center justify-center gap-2 font-bold hover:scale-105 transition">
                <i data-lucide="send"></i> Join Telegram
            </a>
        </div>

        <!-- Main Content -->
        <div class="md:ml-64 p-4 md:p-8 w-full">
            <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                <div id="header-title">
                    <h1 class="text-3xl font-bold">All Batches</h1>
                    <p class="text-slate-400">Welcome back to Rahul Maida Portal</p>
                </div>
                <div class="flex gap-2 w-full md:w-auto">
                    <div id="back-btn-container"></div>
                    <input type="text" id="search" onkeyup="filterBatches()" placeholder="Search batches..." class="bg-slate-800 border border-white/10 p-3 rounded-xl w-full">
                </div>
            </header>

            <!-- Grid Container -->
            <div id="content-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                <!-- Data will load here -->
                <div class="col-span-full flex flex-col items-center justify-center py-20">
                    <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-700 h-12 w-12 mb-4"></div>
                    <p class="text-slate-400">Updating Rahul Maida's Server...</p>
                </div>
            </div>
        </div>
    </div>

   <script>
    const API_BASE = "https://rahul-backend-7ag5.onrender.com"; // CHECK THIS LINK
    let allBatches = [];

    async function loadBatches() {
        const res = await fetch(`${API_BASE}/api/batches`);
        allBatches = await res.json();
        renderBatches(allBatches);
    }

    async function openBatch(batchId) {
        document.getElementById('content-container').innerHTML = '<p class="col-span-full text-center py-10">Loading Subjects...</p>';
        try {
            // BACKEND CHANGE: Use /api/batch-details
            const res = await fetch(`${API_BASE}/api/batch-details?batchId=${batchId}`);
            const data = await res.json();
            renderSubjects(data.data.subjects, batchId);
        } catch(e) { showError("Failed to load subjects."); }
    }

    async function openContent(batchId, subjectId) {
        document.getElementById('content-container').innerHTML = '<p class="col-span-full text-center py-10">Loading Videos & Files...</p>';
        try {
            // BACKEND CHANGE: Use /api/batch-content
            const res = await fetch(`${API_BASE}/api/batch-content?batchId=${batchId}&subjectId=${subjectId}`);
            const data = await res.json();
            renderFinalContent(data.data);
        } catch(e) { showError("Failed to load content."); }
    }

    // Reference common functions from previous code (renderBatches, renderSubjects, etc.)
</script>
</body>
</html>
