<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rahul Maida - Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background: #020617; color: white; }
        .card { background: #0f172a; border: 1px solid #1e293b; transition: 0.3s; }
        .card:hover { border-color: #fbbf24; transform: scale(1.02); }
    </style>
</head>
<body class="p-6">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-10 pb-6 border-b border-white/10">
            <h1 class="text-3xl font-black text-yellow-400" onclick="location.reload()">RAHUL MAIDA</h1>
            <div id="nav-box"></div>
        </header>

        <div id="root" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 text-center">
            <p class="col-span-full py-20 animate-pulse text-slate-500 font-bold">Unlocking Content...</p>
        </div>
    </div>

    <script>
        const API = "https://rahul-backend-7ag5.onrender.com";

        async function init() {
            const res = await fetch(`${API}/api/batches`);
            const data = await res.json();
            document.getElementById('root').innerHTML = data.map(b => `
                <div onclick="openBatch('${b.batchId}')" class="card rounded-3xl overflow-hidden cursor-pointer">
                    <img src="${b.batchImage}" class="w-full h-40 object-cover opacity-80">
                    <div class="p-4 font-bold text-xs line-clamp-2">${b.batchName}</div>
                </div>
            `).join('');
        }

        async function openBatch(bid) {
            const root = document.getElementById('root');
            root.innerHTML = "<p class='col-span-full py-20 animate-bounce'>Searching Subjects...</p>";

            try {
                const res = await fetch(`${API}/api/details/${bid}`);
                const resData = await res.json();
                
                // Deep Search for subjects
                let subjects = [];
                if (resData.data && resData.data.subjects) subjects = resData.data.subjects;
                else if (resData.data && Array.isArray(resData.data)) subjects = resData.data;
                else if (Array.isArray(resData)) subjects = resData;

                document.getElementById('nav-box').innerHTML = `<button onclick="location.reload()" class="bg-white text-black px-4 py-1 rounded-lg font-bold text-xs uppercase">← Back</button>`;

                if(subjects.length === 0) {
                    root.innerHTML = `<div class="col-span-full py-20 bg-slate-900 rounded-3xl border border-white/5 mx-4">
                        <p class="text-red-400 font-bold mb-4">BATCH DATA RESTRICTED</p>
                        <p class="text-xs text-slate-500 mb-6 px-4">The source has moved this batch data. Try another one.</p>
                        <button onclick="location.reload()" class="bg-slate-800 text-white px-6 py-2 rounded-xl text-[10px] font-bold">BACK TO HOME</button>
                    </div>`;
                    return;
                }

                root.innerHTML = subjects.map(s => `
                    <div onclick="openContent('${bid}', '${s.subjectId}')" class="card p-6 rounded-3xl flex items-center gap-4 cursor-pointer">
                        <div class="text-yellow-400"><i data-lucide="folder"></i></div>
                        <span class="font-bold text-xs truncate uppercase">${s.subjectName}</span>
                    </div>
                `).join('');
                lucide.createIcons();
            } catch(e) { init(); }
        }

        async function openContent(bid, sid) {
            const root = document.getElementById('root');
            root.innerHTML = "<p class='col-span-full py-20'>Loading Chapters...</p>";

            const res = await fetch(`${API}/api/content/${bid}/${sid}`);
            const resData = await res.json();
            const content = resData.data || [];

            document.getElementById('nav-box').innerHTML = `<button onclick="openBatch('${bid}')" class="bg-white text-black px-4 py-1 rounded-lg font-bold text-xs uppercase">← Back</button>`;

            root.innerHTML = content.map(item => `
                <div class="card p-6 rounded-[2rem] flex flex-col justify-between items-start h-full text-left">
                    <h4 class="text-[11px] font-extrabold mb-6 leading-relaxed">${item.title}</h4>
                    <a href="${item.url}" target="_blank" class="w-full text-center bg-yellow-400 text-black py-3 rounded-2xl font-black text-[10px] uppercase tracking-tighter">View Material</a>
                </div>
            `).join('');
            lucide.createIcons();
        }

        window.onload = init;
    </script>
</body>
</html>
