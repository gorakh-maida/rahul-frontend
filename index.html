<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rahul Maida Study</title>
    <style>
        body { background: #03040a; margin: 0; color: #facc15; font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .info { text-align: center; }
        .loader { width: 40px; height: 40px; border: 4px solid #333; border-top-color: #facc15; border-radius: 50%; animation: s 1s linear infinite; margin: 0 auto 15px; }
        @keyframes s { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root" class="info">
        <div class="loader"></div>
        <p>RAHUL MAIDA STUDY - Loading Content...</p>
    </div>

    <script>
        // Use your Render URL from logs
        const API_URL = "https://rahul-backend-7ag5.onrender.com";

        async function sync() {
            const params = new URLSearchParams(window.location.search);
            const path = params.get('path') || 'MissionJeet/';
            const query = window.location.search.replace('?path=' + path, '');

            try {
                const res = await fetch(`${API_URL}/${path}${query}`);
                const html = await res.text();
                
                document.open();
                document.write(html);
                document.close();
            } catch (e) {
                document.getElementById('root').innerHTML = "Server waking up... please wait 30s and Refresh.";
            }
        }
        sync();
    </script>
</body>
</html>
