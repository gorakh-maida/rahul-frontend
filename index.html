<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAHUL MAIDA STUDIO 2.0</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --gold: #FFD700; --bg: #000000; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; }
        .card { background: #111; border: 1px solid #222; border-radius: 20px; transition: 0.3s; cursor: pointer; }
        .card:hover { border-color: var(--gold); transform: translateY(-5px); }
        .live-dot { width: 8px; height: 8px; background: red; border-radius: 50%; display: inline-block; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } }
        #debugger { background: #0a0a0a; border-top: 1px solid #333; font-family: monospace; font-size: 10px; height: 100px; overflow-y: auto; color: #0f0; }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <div class="flex-grow p-6 md:p-12">
        <header class="flex justify-between items-center mb-12 border-b border-white/10 pb-6">
            <div>
                <h1 class="text-4xl font-black tracking-tighter uppercase italic">Rahul <span class="text-yellow-400">Maida</span></h1>
                <p class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest mt-1"><span class="live-dot"></span> Server-Side Proxy Active</p>
            </div>
            <div id="nav"></div>
        </header>

        <div id="root" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            <div class="col-span-full text-center py-20 animate-pulse text-zinc-500 font-bold">WAKING UP RENDER BACKEND...</div>
        </div>
    </div>

    <!-- Debug Console for the User -->
    <div id="debugger" class="p-4">
        <div>[SYSTEM] Waiting for handshake...</div>
    </div>

    <script>
        const API = "https://rahul-backend-7ag5.onrender.com";
        const debug = (msg) => {
            const d = document.getElementById('debugger');
            d.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>`;
            d.scrollTop = d.scrollHeight;
        };

        async function init() {
            debug("Connecting to: " + API);
            const root = document.getElementById('root');
            
            try {
                const res = await fetch(`${API}/api/batches`);
                debug("Response Status: " + res.status);
                
                if(!res.ok) throw new Error("Backend Returned " + res.status);
                
                const data = await res.json();
                debug("Data Received: " + data.length + " batches found.");

                root.innerHTML = data.map(b => `
                    <div onclick="openBatch('${b.batchId || b._id}')" class="card p-4 group">
                        <img src="${b.batchImage}" class="w-full h-40 object-cover rounded-xl mb-4 group-hover:opacity-80 transition">
                        <h3 class="font-bold text-sm h-10 line-clamp-2">${b.batchName}</h3>
                        <div class="mt-4 flex justify-between items-center opacity-50 text-[10px] uppercase font-bold">
                            <span>Open Batch</span>
                            <i data-lucide="arrow-right" class="w-3 h-3"></i>
                        </div>
                    </div>
                `).join('');
                lucide.createIcons();
            } catch (err) {
                debug("FATAL ERROR: " + err.message);
                root.innerHTML = `<div class="col-span-full text-center py-20">
                    <div class="text-red-500 font-bold mb-4 italic">CRITICAL CONNECTION ERROR</div>
                    <button onclick="location.reload()" class="bg-yellow-400 text-black px-10 py-3 rounded-full font-black uppercase text-xs">Force Restart Portal</button>
                    <p class="text-[10px] text-zinc-600 mt-6">Check Debug Console below for exact error point.</p>
                </div>`;
            }
        }

        async function openBatch(bid) {
            debug("Fetching Subjects for BID: " + bid);
            document.getElementById('root').innerHTML = `<div class="col-span-full text-center py-20 font-bold text-yellow-400">LOADING SUBJECTS...</div>`;
            
            try {
                const res = await fetch(`${API}/api/details/${bid}`);
                const resData = await res.json();
                const subjects = resData.data.subjects || [];
                debug(subjects.length + " subjects loaded.");

                document.getElementById('nav').innerHTML = `<button onclick="location.reload()" class="border border-white/20 text-white px-6 py-2 rounded-full text-[10px] font-bold uppercase tracking-widest">Back</button>`;

                document.getElementById('root').innerHTML = subjects.map(s => `
                    <div onclick="openContent('${bid}', '${s.subjectId || s._id}')" class="card p-8 flex flex-col items-center gap-4 text-center">
                        <div class="bg-yellow-400/10 p-4 rounded-ful text-yellow-400"><i data-lucide="folder" class="w-8 h-8"></i></div>
                        <span class="font-bold text-xs uppercase tracking-tighter">${s.subjectName || s.name}</span>
                    </div>
                `).join('');
                lucide.createIcons();
            } catch(e) { debug("Error loading subjects: " + e.message); }
        }

        async function openContent(bid, sid) {
            debug("Fetching Content for SID: " + sid);
            document.getElementById('root').innerHTML = `<div class="col-span-full text-center py-20 font-bold text-yellow-100">SYNCING LECTURES...</div>`;
            
            try {
                const res = await fetch(`${API}/api/content/${bid}/${sid}`);
                const resData = await res.json();
                const content = resData.data || [];
                debug(content.length + " lectures found.");

                document.getElementById('root').innerHTML = content.map(item => `
                    <div class="card p-5 flex flex-col justify-between">
                        <h4 class="text-xs font-bold leading-relaxed mb-6">${item.title}</h4>
                        <a href="${item.url}" target="_blank" class="block text-center bg-white text-black py-3 rounded-xl font-black text-[10px] uppercase tracking-tighter hover:bg-yellow-400 transition">Watch Now</a>
                    </div>
                `).join('');
                lucide.createIcons();
            } catch(e) { debug("Error loading lectures: " + e.message); }
        }

        window.onload = init;
    </script>
</body>
</html>
