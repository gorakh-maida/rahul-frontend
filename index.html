<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rahul Maida - Study Portal</title>
    <!-- Tailwind & Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); }
        .course-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .course-card:hover { transform: translateY(-5px); border-color: #facc15; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-200 min-h-screen font-sans">

    <!-- Sidebar (Desktop) -->
    <div class="fixed left-0 top-0 h-full w-64 bg-[#020617] border-r border-white/5 hidden md:flex flex-col p-6 z-50">
        <h1 class="text-2xl font-black text-yellow-500 tracking-tighter mb-2">RAHUL <span class="text-white">MAIDA</span></h1>
        <p class="text-[10px] text-slate-500 uppercase tracking-widest font-bold mb-10">Premium Education</p>
        
        <nav class="space-y-2">
            <button onclick="location.reload()" class="w-full flex items-center gap-3 bg-yellow-400/10 text-yellow-400 p-3 rounded-xl border border-yellow-400/20 font-semibold group">
                <i data-lucide="layout-grid" class="w-5 h-5"></i> All Batches
            </button>
        </nav>

        <div class="mt-auto space-y-4">
            <div class="p-4 rounded-2xl bg-slate-800/40 border border-white/5">
                <p class="text-xs text-slate-400 mb-2">Need Help?</p>
                <a href="https://t.me/official_rahulmaida" target="_blank" class="flex items-center justify-center gap-2 bg-[#229ED9] hover:bg-[#1e8ec4] text-white p-3 rounded-xl font-bold transition-all text-sm">
                    <i data-lucide="send" class="w-4 h-4"></i> Support Group
                </a>
            </div>
            <p class="text-center text-[10px] text-slate-600">© 2024 Rahul Maida</p>
        </div>
    </div>

    <!-- Main Content -->
    <div class="md:ml-64 p-4 md:p-8">
        <!-- Header -->
        <header class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-12">
            <div id="header-text">
                <h2 id="title-main" class="text-4xl font-extrabold text-white tracking-tight mb-2">Courses</h2>
                <p id="sub-main" class="text-slate-400 text-sm font-medium">Select your favorite batch and start learning from experts.</p>
            </div>
            <div id="header-action"></div>
        </header>

        <!-- Dynamic Grid -->
        <div id="main-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- Loader State -->
            <div class="col-span-full py-32 text-center">
                <div class="animate-spin w-12 h-12 border-4 border-yellow-500 border-t-transparent rounded-full mx-auto mb-6"></div>
                <h3 class="text-xl font-bold text-white mb-2">Connecting to Server</h3>
                <p class="text-slate-400">Please wait while we fetch your study material...</p>
            </div>
        </div>
    </div>

    <script>
        // API Configuration
        const API_BASE = "https://rahul-backend-7ag5.onrender.com";
        let currentBatchId = "";

        // Function 1: Load All Batches
        async function loadBatches() {
            try {
                const res = await fetch(`${API_BASE}/api/batches`);
                const data = await res.json();
                renderBatches(data);
            } catch (err) {
                console.error("Fetch Error:", err);
                showError("Connection Failed. Check your internet or backend status.");
            }
        }

        // Function 2: Render Batches to Grid
        function renderBatches(batches) {
            const grid = document.getElementById('main-grid');
            
            // Check if backend is still syncing
            if (!batches || batches.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full text-center py-20 bg-slate-800/20 rounded-3xl border border-dashed border-white/10">
                        <i data-lucide="refresh-cw" class="w-10 h-10 text-yellow-500 mx-auto mb-4 animate-spin-slow"></i>
                        <h3 class="text-lg font-bold text-white mb-2">Backend is Syncing...</h3>
                        <p class="text-slate-400 mb-6">Data is being fetched from the source. This takes 30-60 seconds on first run.</p>
                        <button onclick="loadBatches()" class="bg-yellow-500 hover:bg-yellow-600 text-black px-8 py-3 rounded-2xl font-black transition-all">TRY REFRESH NOW</button>
                    </div>`;
                lucide.createIcons();
                return;
            }

            grid.innerHTML = batches.map(b => `
                <div onclick="openBatch('${b.batchId}')" class="course-card bg-[#1e293b] border border-white/5 rounded-[2rem] overflow-hidden cursor-pointer group shadow-2xl">
                    <div class="relative h-48 overflow-hidden">
                        <img src="${b.batchImage}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                        <div class="absolute inset-0 bg-gradient-to-t from-[#1e293b] via-transparent to-transparent opacity-90"></div>
                        <div class="absolute bottom-4 left-4">
                             <p class="text-[10px] uppercase tracking-[0.2em] text-yellow-400 font-black mb-1">${b.byName || 'EXPERT FACULTY'}</p>
                        </div>
                    </div>
                    <div class="p-6">
                        <h3 class="text-white font-bold text-sm line-clamp-2 leading-relaxed h-10">${b.batchName}</h3>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        // Function 3: Open Subjects for a Batch
        async function openBatch(id) {
            currentBatchId = id;
            document.getElementById('main-grid').innerHTML = '<div class="col-span-full py-20 text-center"><div class="animate-spin w-8 h-8 border-4 border-yellow-500 border-t-transparent rounded-full mx-auto mb-4"></div><p>Opening Subjects...</p></div>';
            
            try {
                const res = await fetch(`${API_BASE}/api/details/${id}`);
                const response = await res.json();
                
                document.getElementById('title-main').innerText = "Subjects";
                document.getElementById('sub-main').innerText = "Select a subject to browse videos and notes.";
                document.getElementById('header-action').innerHTML = `
                    <button onclick="location.reload()" class="bg-slate-800 hover:bg-slate-700 px-6 py-3 rounded-2xl text-xs font-black border border-white/5 transition-all flex items-center gap-2">
                        <i data-lucide="arrow-left" class="w-4 h-4"></i> BACK TO COURSES
                    </button>`;

                const grid = document.getElementById('main-grid');
                if(!response.data || !response.data.subjects) throw new Error("No Subjects");

                grid.innerHTML = response.data.subjects.map(s => `
                    <div onclick="openContent('${s.subjectId}', '${s.subjectName}')" class="bg-[#1e293b] p-6 rounded-3xl border border-white/5 hover:border-yellow-500/50 transition-all cursor-pointer flex items-center gap-5 group">
                        <div class="w-14 h-14 bg-yellow-500/10 rounded-2xl flex items-center justify-center text-yellow-500 group-hover:bg-yellow-500 group-hover:text-black transition-all duration-500">
                            <i data-lucide="folder-closed" class="w-6 h-6"></i>
                        </div>
                        <div>
                            <h3 class="font-bold text-sm text-white">${s.subjectName}</h3>
                            <p class="text-[10px] text-slate-500 mt-1 uppercase font-bold">Videos & PDFs</p>
                        </div>
                    </div>
                `).join('');
                lucide.createIcons();
            } catch (err) { showError("Failed to load subjects. Try again."); }
        }

        // Function 4: Open Videos/PDFs for a Subject
        async function openContent(subId, subName) {
            document.getElementById('main-grid').innerHTML = '<div class="col-span-full py-20 text-center"><div class="animate-spin w-8 h-8 border-4 border-yellow-500 border-t-transparent rounded-full mx-auto mb-4"></div><p>Loading Content...</p></div>';
            
            try {
                const res = await fetch(`${API_BASE}/api/content/${currentBatchId}/${subId}`);
                const response = await res.json();

                document.getElementById('title-main').innerText = subName;
                document.getElementById('header-action').innerHTML = `
                    <button onclick="openBatch('${currentBatchId}')" class="bg-slate-800 hover:bg-slate-700 px-6 py-3 rounded-2xl text-xs font-black border border-white/5 transition-all flex items-center gap-2">
                        <i data-lucide="arrow-left" class="w-4 h-4"></i> BACK TO SUBJECTS
                    </button>`;

                const grid = document.getElementById('main-grid');
                if(!response.data || response.data.length === 0) {
                    grid.innerHTML = '<div class="col-span-full text-center py-20 text-slate-500 font-bold">No content available for this subject yet.</div>';
                    return;
                }

                grid.innerHTML = response.data.map(item => `
                    <div class="bg-[#1e293b] p-6 rounded-[2rem] border border-white/5 shadow-2xl flex flex-col justify-between">
                        <div class="mb-6">
                            <div class="w-10 h-10 ${item.url.includes('.pdf') ? 'bg-red-500/10 text-red-500' : 'bg-blue-500/10 text-blue-500'} rounded-xl flex items-center justify-center mb-4">
                                <i data-lucide="${item.url.includes('.pdf') ? 'file-text' : 'play-circle'}" class="w-6 h-6"></i>
                            </div>
                            <h4 class="text-white font-bold text-sm leading-snug line-clamp-3">${item.title}</h4>
                        </div>
                        <a href="${item.url}" target="_blank" class="block w-full text-center ${item.url.includes('.pdf') ? 'bg-red-500 hover:bg-red-600' : 'bg-yellow-500 hover:bg-yellow-600'} text-black py-4 rounded-2xl font-black text-[10px] transition-all uppercase tracking-widest">
                            ${item.url.includes('.pdf') ? 'VIEW DOCUMENT (PDF)' : 'WATCH LECTURE NOW'}
                        </a>
                    </div>
                `).join('');
                lucide.createIcons();
            } catch (err) { showError("Failed to load content."); }
        }

        // Utility: Show Error Message
        function showError(msg) {
            document.getElementById('main-grid').innerHTML = `
                <div class="col-span-full text-center py-16 bg-red-500/10 border border-red-500/20 rounded-[2.5rem]">
                    <i data-lucide="alert-circle" class="w-12 h-12 text-red-500 mx-auto mb-4"></i>
                    <h3 class="text-xl font-bold text-white mb-2 underline decoration-red-500/50">Error Detected</h3>
                    <p class="text-red-300/80 font-medium mb-6">${msg}</p>
                    <button onclick="location.reload()" class="bg-red-500 text-white px-8 py-3 rounded-2xl font-black text-xs transition-all hover:scale-105 active:scale-95 shadow-lg shadow-red-500/20">RETRY CONNECTION</button>
                </div>`;
            lucide.createIcons();
        }

        // Initialize App
        window.onload = loadBatches;
    </script>
</body>
</html>
