<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni Study Clone | Rahul Maida</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #0c111d; color: #fff; }
        .sidebar { background-color: #101828; border-right: 1px solid #1d2939; }
        .batch-card { background-color: #1d2939; border: 1px solid #344054; transition: transform 0.2s, border-color 0.2s; }
        .batch-card:hover { transform: translateY(-4px); border-color: #facc15; }
        .loader-spinner { border-top-color: #facc15; border-right-color: transparent; }
    </style>
</head>
<body class="flex">

    <!-- Sidebar -->
    <aside class="sidebar fixed left-0 top-0 h-screen w-64 hidden md:flex flex-col p-6 z-40">
        <div class="mb-10">
            <h1 class="text-xl font-extrabold text-[#facc15]">OMNI STUDY <span class="text-white">v2</span></h1>
            <p class="text-[10px] text-slate-500 uppercase font-black">Powered by Rahul Maida</p>
        </div>
        <nav class="space-y-4">
            <button onclick="window.location.reload()" class="flex items-center gap-3 w-full bg-[#344054] text-white p-3 rounded-xl">
                <i data-lucide="home" class="w-5 h-5"></i> My Courses
            </button>
            <a href="https://t.me/official_rahulmaida" target="_blank" class="flex items-center gap-3 w-full text-slate-400 p-3 hover:text-white">
                <i data-lucide="send" class="w-5 h-5"></i> Join Telegram
            </a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="md:ml-64 w-full min-h-screen p-4 md:p-10">
        
        <header class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-12">
            <div>
                <h2 id="title-text" class="text-3xl font-bold">What will you learn today?</h2>
                <p class="text-slate-400">Search and find your batch below.</p>
            </div>
            <!-- Search Bar -->
            <div class="relative w-full max-w-md">
                <i data-lucide="search" class="absolute left-4 top-3.5 text-slate-500 w-5 h-5"></i>
                <input type="text" id="searchInput" placeholder="Search batch name..." class="w-full bg-[#1d2939] border border-[#344054] p-3 pl-12 rounded-xl focus:outline-none focus:border-[#facc15]">
            </div>
        </header>

        <div id="grid-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- Loading State -->
            <div id="loader" class="col-span-full py-20 text-center">
                <div class="animate-spin w-12 h-12 border-4 loader-spinner rounded-full mx-auto mb-4"></div>
                <p class="text-slate-400">Loading your Study Desk...</p>
            </div>
        </div>
    </main>

    <script>
        const API_URL = "https://rahul-backend-7ag5.onrender.com";
        let allBatches = [];

        // 1. Load Batches
        async function fetchBatches() {
            try {
                const response = await fetch(`${API_URL}/api/batches`);
                const data = await response.json();
                allBatches = data;
                renderBatches(allBatches);
            } catch (err) {
                document.getElementById('grid-container').innerHTML = `
                    <div class="col-span-full text-center bg-red-500/10 p-10 rounded-2xl border border-red-500/20">
                        <p class="text-red-400 font-bold mb-4">Cannot connect to server. Render is waking up.</p>
                        <button onclick="fetchBatches()" class="bg-red-500 text-white px-8 py-2 rounded-lg font-bold">Retry Now</button>
                    </div>`;
            }
        }

        // 2. Render Cards (Exact Omni Study Style)
        function renderBatches(batches) {
            const grid = document.getElementById('grid-container');
            if (batches.length === 0) {
                grid.innerHTML = `<p class="col-span-full text-center py-20">No batches found. Check back in a few seconds.</p>`;
                return;
            }

            grid.innerHTML = batches.map(b => `
                <div class="batch-card rounded-2xl overflow-hidden cursor-pointer" onclick="openDetails('${b.batchId}')">
                    <img src="${b.batchImage}" class="w-full h-44 object-cover" onerror="this.src='https://placehold.co/400x200/1d2939/ffffff?text=STUDY+PORTAL'">
                    <div class="p-5">
                        <h3 class="text-white font-bold text-sm mb-4 line-clamp-2">${b.batchName}</h3>
                        <div class="flex items-center justify-between">
                            <span class="text-[10px] bg-blue-500/20 text-blue-400 px-2 py-1 rounded font-bold">BATCH</span>
                            <span class="text-[10px] text-slate-500">${b.byName || 'RAHUL MAIDA'}</span>
                        </div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        // 3. Search Logic
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filtered = allBatches.filter(b => b.batchName.toLowerCase().includes(query));
            renderBatches(filtered);
        });

        // Placeholder for further clicks (Details & Content)
        function openDetails(id) { 
            alert("Subject details fetching logic can be added similarly. Use API: /api/details/" + id);
        }

        document.addEventListener('DOMContentLoaded', () => {
            fetchBatches();
            lucide.createIcons();
        });
    </script>
</body>
</html>
