<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rahul Maida - Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #0f172a; color: white; }
        .card { background: #1e293b; border: 1px solid #ffffff10; transition: 0.3s; }
        .card:hover { border-color: #fbbf24; transform: scale(1.02); }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8 border-b border-white/10 pb-4">
            <h1 onclick="location.reload()" class="text-2xl font-black text-yellow-400 cursor-pointer">RAHUL MAIDA</h1>
            <div id="btn-box"></div>
        </header>

        <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-20">
                <p class="animate-pulse">Loading study data...</p>
            </div>
        </div>
        
        <!-- Debug Section -->
        <div id="debug" class="mt-20 p-4 bg-black/40 rounded text-[10px] text-slate-500 font-mono hidden"></div>
    </div>

    <script>
        const API = "https://rahul-backend-7ag5.onrender.com";
        let curBatch = "";

        // Function 1: Load All
        async function loadAll() {
            const grid = document.getElementById('grid');
            try {
                const res = await fetch(`${API}/api/batches`);
                const data = await res.json();
                
                grid.innerHTML = data.map(b => `
                    <div onclick="openBatch('${b.batchId}')" class="card p-4 rounded-2xl cursor-pointer">
                        <img src="${b.batchImage}" class="w-full h-40 object-cover rounded-xl mb-4">
                        <h3 class="font-bold text-sm h-10 line-clamp-2">${b.batchName}</h3>
                        <p class="text-yellow-500 text-[10px] mt-2 font-bold uppercase">${b.byName || 'EXPERT'}</p>
                    </div>
                `).join('');
                lucide.createIcons();
            } catch (e) { grid.innerHTML = "Server connection error."; }
        }

        // Function 2: Open Subjects
        async function openBatch(bid) {
            curBatch = bid;
            const grid = document.getElementById('grid');
            grid.innerHTML = "<div class='col-span-full py-10 text-center animate-bounce'>Checking Subjects...</div>";

            try {
                const res = await fetch(`${API}/api/details/${bid}`);
                const resData = await res.json();
                
                // DATA DEBUGGING
                document.getElementById('debug').classList.remove('hidden');
                document.getElementById('debug').innerText = "RAW DATA: " + JSON.stringify(resData).substring(0, 500);

                let subjects = [];
                if (resData.data && resData.data.subjects) subjects = resData.data.subjects;
                else if (resData.data && Array.isArray(resData.data)) subjects = resData.data;
                else if (Array.isArray(resData)) subjects = resData;

                document.getElementById('btn-box').innerHTML = `<button onclick="location.reload()" class="bg-white text-black px-4 py-1 rounded text-xs font-bold">← BACK</button>`;

                if (subjects.length === 0) {
                    grid.innerHTML = `<div class="col-span-full text-center py-20">
                        <p class="text-red-400">No Subjects Found in this Batch.</p>
                        <p class="text-xs text-slate-500 mt-2">Check the debug info at bottom for details.</p>
                    </div>`;
                    return;
                }

                grid.innerHTML = subjects.map(s => `
                    <div onclick="openContent('${bid}', '${s.subjectId}')" class="card p-6 rounded-2xl flex items-center gap-4 cursor-pointer">
                        <div class="text-yellow-400"><i data-lucide="folder"></i></div>
                        <span class="font-bold text-sm truncate">${s.subjectName}</span>
                    </div>
                `).join('');
                lucide.createIcons();
            } catch (e) { alert("Error loading batch."); }
        }

        // Function 3: Open Lectures/Files
        async function openContent(bid, sid) {
            const grid = document.getElementById('grid');
            grid.innerHTML = "<div class='col-span-full py-10 text-center'>Loading Lectures...</div>";

            try {
                const res = await fetch(`${API}/api/content/${bid}/${sid}`);
                const resData = await res.json();
                const content = resData.data || [];

                document.getElementById('btn-box').innerHTML = `<button onclick="openBatch('${bid}')" class="bg-white text-black px-4 py-1 rounded text-xs font-bold">← BACK</button>`;

                if (content.length === 0) {
                    grid.innerHTML = "<div class='col-span-full text-center py-20 text-slate-500'>This folder is empty.</div>";
                    return;
                }

                grid.innerHTML = content.map(item => `
                    <div class="card p-5 rounded-2xl flex flex-col justify-between">
                        <div>
                            <div class="text-yellow-400 mb-2"><i data-lucide="${item.url.includes('.pdf') ? 'file-text' : 'play-circle'}"></i></div>
                            <h4 class="text-xs font-bold line-clamp-2">${item.title}</h4>
                        </div>
                        <a href="${item.url}" target="_blank" class="mt-4 block w-full text-center bg-yellow-400 text-black py-2 rounded-lg font-bold text-[10px] uppercase">OPEN NOW</a>
                    </div>
                `).join('');
                lucide.createIcons();
            } catch (e) { alert("Error loading content."); }
        }

        window.onload = loadAll;
    </script>
</body>
</html>
