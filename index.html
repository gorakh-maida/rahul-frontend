<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rahul Maida - Study Portal</title>
    <!-- CSS & Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .card { background: #1e293b; border: 1px solid rgba(255,255,255,0.05); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card:hover { border-color: #facc15; transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); }
        .glass-nav { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen pb-10">

    <!-- Header Section -->
    <nav class="glass-nav sticky top-0 z-50 px-4 py-4 md:px-8">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div onclick="location.reload()" class="cursor-pointer group">
                <h1 class="text-2xl font-black tracking-tighter text-white">RAHUL <span class="text-yellow-400 group-hover:text-white transition-colors">MAIDA</span></h1>
                <p id="nav-subtitle" class="text-[10px] uppercase tracking-[0.3em] text-slate-500 font-bold">Premium Study Portal</p>
            </div>
            <div id="header-action" class="flex items-center gap-3">
                <!-- Back buttons will appear here -->
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 md:px-8 pt-10">
        <header class="mb-10">
            <h2 id="page-title" class="text-3xl md:text-4xl font-extrabold text-white mb-2">My Batches</h2>
            <p id="page-desc" class="text-slate-400 text-sm">Welcome back! Select a batch to continue your learning.</p>
        </header>

        <!-- Dynamic Content Grid -->
        <div id="main-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- Loading State -->
            <div class="col-span-full py-20 text-center">
                <div class="animate-spin w-12 h-12 border-4 border-yellow-500 border-t-transparent rounded-full mx-auto mb-6"></div>
                <h3 class="text-xl font-bold text-white mb-2">Establishing Connection</h3>
                <p class="text-slate-400">Loading your personalized study material...</p>
            </div>
        </div>
    </main>

    <script>
        const API_BASE = "https://rahul-backend-7ag5.onrender.com";
        let currentBatchId = "";

        // 1. Initial Load: All Batches
        async function loadAllBatches() {
            const grid = document.getElementById('main-grid');
            try {
                const res = await fetch(`${API_BASE}/api/batches`);
                const data = await res.json();

                if (!data || data.length === 0) {
                    grid.innerHTML = `
                        <div class="col-span-full py-20 bg-slate-800/20 border border-dashed border-white/10 rounded-3xl text-center">
                            <i data-lucide="refresh-cw" class="w-10 h-10 text-yellow-500 mx-auto mb-4 animate-spin-slow"></i>
                            <h3 class="text-lg font-bold text-white mb-2">Backend is Syncing</h3>
                            <p class="text-slate-400 mb-6">Wait 30 seconds for the first-time setup.</p>
                            <button onclick="loadAllBatches()" class="bg-yellow-500 text-black px-8 py-3 rounded-2xl font-black text-xs uppercase transition-all hover:scale-105 active:scale-95 shadow-xl shadow-yellow-500/10">Retry Now</button>
                        </div>`;
                    lucide.createIcons();
                    return;
                }

                grid.innerHTML = data.map(b => `
                    <div onclick="openBatchDetails('${b.batchId}')" class="card rounded-3xl overflow-hidden cursor-pointer group shadow-2xl">
                        <div class="relative h-44 overflow-hidden">
                            <img src="${b.batchImage}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                            <div class="absolute inset-0 bg-gradient-to-t from-[#1e293b] via-transparent to-transparent opacity-80"></div>
                        </div>
                        <div class="p-6">
                            <h3 class="text-white font-bold text-sm h-10 line-clamp-2 leading-tight">${b.batchName}</h3>
                            <div class="mt-4 flex items-center justify-between">
                                <span class="bg-yellow-500/10 text-yellow-500 text-[9px] px-2 py-1 rounded-md font-black uppercase tracking-widest">${b.byName || 'RAHUL MAIDA'}</span>
                                <i data-lucide="chevron-right" class="w-4 h-4 text-slate-600 group-hover:text-yellow-400 group-hover:translate-x-1 transition-all"></i>
                            </div>
                        </div>
                    </div>
                `).join('');
                lucide.createIcons();
            } catch (err) {
                showErrorMessage("Connection Failed: " + err.message);
            }
        }

        // 2. Open Batch Details (Subjects)
        async function openBatchDetails(batchId) {
            currentBatchId = batchId;
            const grid = document.getElementById('main-grid');
            grid.innerHTML = '<div class="col-span-full py-20 text-center"><div class="animate-spin w-8 h-8 border-4 border-yellow-500 border-t-transparent rounded-full mx-auto mb-4"></div><p class="text-yellow-400 font-bold uppercase tracking-widest text-xs">Opening Subjects...</p></div>';

            try {
                const res = await fetch(`${API_BASE}/api/details/${batchId}`);
                const resData = await res.json();

                // SMART DATA DETECTION: Handles all JSON formats
                let subjects = [];
                if (resData.data && resData.data.subjects) subjects = resData.data.subjects;
                else if (resData.data && Array.isArray(resData.data)) subjects = resData.data;
                else if (Array.isArray(resData)) subjects = resData;

                updateHeader("Subjects List", "Explore available study material for this batch.", true, "HOME");

                if (subjects.length === 0) {
                    grid.innerHTML = `<div class="col-span-full p-20 text-center bg-slate-800/30 rounded-[2.5rem] border border-white/5 shadow-2xl">
                        <i data-lucide="folder-x" class="w-12 h-12 text-slate-600 mx-auto mb-4"></i>
                        <h3 class="text-xl font-bold text-white mb-2">No Content Found</h3>
                        <p class="text-slate-400 mb-6">Either this batch is empty or data is still loading.</p>
                        <button onclick="location.reload()" class="bg-slate-700 text-white px-8 py-3 rounded-2xl font-bold text-xs uppercase">Back to Home</button>
                    </div>`;
                    lucide.createIcons();
                    return;
                }

                grid.innerHTML = subjects.map(s => `
                    <div onclick="openSubjectContent('${batchId}', '${s.subjectId}', '${s.subjectName.replace(/'/g, "")}')" class="card p-6 rounded-[1.5rem] cursor-pointer group flex items-center gap-5">
                        <div class="h-14 w-14 bg-yellow-500/10 rounded-2xl flex items-center justify-center text-yellow-500 group-hover:bg-yellow-500 group-hover:text-black transition-all duration-500">
                            <i data-lucide="folder-closed" class="w-7 h-7"></i>
                        </div>
                        <div class="overflow-hidden">
                            <h3 class="text-white font-extrabold text-sm truncate">${s.subjectName}</h3>
                            <p class="text-[10px] text-slate-500 uppercase font-black tracking-widest mt-1">Videos & Documents</p>
                        </div>
                    </div>
                `).join('');
                lucide.createIcons();
            } catch (err) {
                showErrorMessage("Failed to load subjects.");
            }
        }

        // 3. Open Subject Content (Videos/PDFs)
        async function openSubjectContent(batchId, subjectId, subjectName) {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = '<div class="col-span-full py-20 text-center"><div class="animate-spin w-8 h-8 border-4 border-yellow-500 border-t-transparent rounded-full mx-auto mb-4"></div><p class="text-yellow-400 font-bold uppercase tracking-widest text-xs">Loading Content...</p></div>';

            try {
                const res = await fetch(`${API_BASE}/api/content/${batchId}/${subjectId}`);
                const resData = await res.json();
                
                // Content detected universally
                const content = resData.data || (Array.isArray(resData) ? resData : []);

                updateHeader(subjectName, "Browse your selected subject lessons.", true, "SUBJECTS");

                if (!content || content.length === 0) {
                    grid.innerHTML = '<div class="col-span-full text-center py-20 text-slate-500 font-bold uppercase tracking-widest text-xs">This folder is currently empty.</div>';
                    return;
                }

                grid.innerHTML = content.map(item => `
                    <div class="card p-6 rounded-[2rem] flex flex-col justify-between h-full shadow-2xl">
                        <div class="mb-6">
                            <div class="w-12 h-12 ${item.url.includes('.pdf') ? 'bg-red-500/10 text-red-500' : 'bg-blue-500/10 text-blue-500'} rounded-2xl flex items-center justify-center mb-4">
                                <i data-lucide="${item.url.includes('.pdf') ? 'file-text' : 'play-circle'}" class="w-6 h-6"></i>
                            </div>
                            <h4 class="text-white font-bold text-sm leading-snug line-clamp-3">${item.title}</h4>
                        </div>
                        <a href="${item.url}" target="_blank" class="block w-full text-center ${item.url.includes('.pdf') ? 'bg-red-600' : 'bg-yellow-500 ring-4 ring-yellow-500/10'} text-${item.url.includes('.pdf') ? 'white' : 'black'} py-4 rounded-2xl font-black text-[10px] transition-all uppercase tracking-widest hover:scale-105 active:scale-95">
                            ${item.url.includes('.pdf') ? 'View PDF' : 'Watch Lecture'}
                        </a>
                    </div>
                `).join('');
                lucide.createIcons();
            } catch (err) {
                showErrorMessage("Failed to load lessons.");
            }
        }

        // --- Utility Functions ---

        function updateHeader(title, desc, showBack, type) {
            document.getElementById('page-title').innerText = title;
            document.getElementById('page-desc').innerText = desc;
            
            const actionContainer = document.getElementById('header-action');
            if (showBack) {
                const backAction = type === "HOME" ? "location.reload()" : `openBatchDetails('${currentBatchId}')`;
                actionContainer.innerHTML = `
                    <button onclick="${backAction}" class="bg-slate-800 hover:bg-slate-700 text-white px-5 py-3 rounded-2xl text-[10px] font-black tracking-widest uppercase border border-white/5 transition-all flex items-center gap-2">
                        <i data-lucide="arrow-left" class="w-4 h-4"></i> BACK
                    </button>`;
            } else {
                actionContainer.innerHTML = "";
            }
            lucide.createIcons();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function showErrorMessage(msg) {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = `
                <div class="col-span-full p-10 bg-red-500/10 border border-red-500/20 rounded-3xl text-center">
                    <i data-lucide="alert-circle" class="w-10 h-10 text-red-500 mx-auto mb-4"></i>
                    <h3 class="text-lg font-bold text-white mb-2 underline decoration-red-500/20 underline-offset-4 leading-loose">Internal System Error</h3>
                    <p class="text-red-300/80 font-medium text-xs mb-6 max-w-xs mx-auto">${msg}</p>
                    <button onclick="location.reload()" class="bg-red-500 text-white px-8 py-3 rounded-2xl font-black text-[10px] uppercase shadow-lg shadow-red-500/30 transition-all hover:scale-110 active:scale-95">Retry Sync</button>
                </div>`;
            lucide.createIcons();
        }

        // Initialize App
        window.onload = loadAllBatches;
    </script>
</body>
</html>
