<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rahul Maida - Study Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background: #020617; color: #f8fafc; font-family: system-ui, -apple-system, sans-serif; }
        .batch-card { background: #0f172a; border: 1px solid #1e293b; transition: 0.3s; }
        .batch-card:hover { border-color: #eab308; transform: translateY(-4px); }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-12 border-b border-white/5 pb-6">
            <h1 class="text-3xl font-black tracking-tight" onclick="location.reload()">RAHUL <span class="text-yellow-500">MAIDA</span></h1>
            <div id="nav-action"></div>
        </header>

        <div id="root" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            <div class="col-span-full py-20 text-center">
                <div class="w-10 h-10 border-4 border-yellow-500 border-t-transparent animate-spin rounded-full mx-auto mb-4"></div>
                <p class="text-slate-400">Connecting to Rahul's Secure Portal...</p>
            </div>
        </div>
    </div>

    <script>
        const API = "https://rahul-backend-7ag5.onrender.com";

        async function init() {
            try {
                const r = await fetch(`${API}/api/batches`);
                const data = await r.json();
                const container = document.getElementById('root');
                
                if(!data || data.length === 0) {
                    container.innerHTML = "Backend is still syncing... Refresh in 1 minute.";
                    return;
                }

                container.innerHTML = data.map(b => `
                    <div onclick="openBatch('${b.batchId}')" class="batch-card rounded-3xl overflow-hidden cursor-pointer">
                        <img src="${b.batchImage}" class="w-full h-40 object-cover opacity-80">
                        <div class="p-5 font-bold text-xs line-clamp-2">${b.batchName}</div>
                    </div>
                `).join('');
            } catch (e) { document.getElementById('root').innerHTML = "Server Error. Check Render logs."; }
        }

        async function openBatch(id) {
            const root = document.getElementById('root');
            root.innerHTML = `<div class="col-span-full py-20 text-center animate-pulse text-yellow-500 font-bold uppercase tracking-widest">Unlocking Batch Data...</div>`;
            
            try {
                const r = await fetch(`${API}/api/details/${id}`);
                const resData = await r.json();
                
                let subjects = [];
                if(resData.data) {
                    subjects = resData.data.subjects || (Array.isArray(resData.data) ? resData.data : []);
                }

                document.getElementById('nav-action').innerHTML = `<button onclick="location.reload()" class="bg-white text-black px-6 py-2 rounded-2xl font-black text-[10px] uppercase">← Back</button>`;

                if(subjects.length === 0) {
                    root.innerHTML = `
                        <div class="col-span-full py-20 text-center bg-slate-900 rounded-3xl border border-white/5">
                            <p class="text-xl font-bold mb-2 text-red-400">Source Restricted (0 Subjects)</p>
                            <p class="text-slate-500 text-sm mb-6">Source site ne data block kiya hai ya batch khali hai.</p>
                            <button onclick="openBatch('${id}')" class="bg-yellow-500 text-black px-8 py-3 rounded-xl font-bold">Retry Now</button>
                        </div>`;
                    return;
                }

                root.innerHTML = subjects.map(s => `
                    <div onclick="openContent('${id}', '${s.subjectId}')" class="batch-card p-6 rounded-3xl flex items-center gap-4 cursor-pointer hover:bg-slate-800">
                        <div class="bg-yellow-500 text-black p-3 rounded-2xl"><i data-lucide="folder"></i></div>
                        <span class="font-bold text-sm truncate">${s.subjectName}</span>
                    </div>
                `).join('');
                lucide.createIcons();
            } catch (e) { location.reload(); }
        }

        async function openContent(bid, sid) {
            const root = document.getElementById('root');
            root.innerHTML = `<div class="col-span-full py-20 text-center">Loading Lectures...</div>`;

            try {
                const r = await fetch(`${API}/api/content/${bid}/${sid}`);
                const resData = await r.json();
                const content = resData.data || [];

                root.innerHTML = content.map(item => `
                    <div class="batch-card p-6 rounded-[2rem] flex flex-col justify-between h-full">
                        <h4 class="text-xs font-bold leading-relaxed mb-6">${item.title}</h4>
                        <a href="${item.url}" target="_blank" class="block text-center bg-yellow-500 text-black py-4 rounded-2xl font-black text-[10px] uppercase shadow-lg shadow-yellow-500/20 transition-all hover:scale-105 active:scale-95">Open Material</a>
                    </div>
                `).join('');
                lucide.createIcons();
            } catch (e) { alert("Content Error"); }
        }

        window.onload = init;
    </script>
</body>
</html>
