<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rahul Study Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: sans-serif; }
        .card { background: #1e293b; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .card:hover { border-color: #facc15; transform: translateY(-3px); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-10 border-b border-white/5 pb-6">
            <div>
                <h1 id="title" class="text-3xl font-black text-white">RAHUL <span class="text-yellow-400">MAIDA</span></h1>
                <p id="subtitle" class="text-slate-400 text-sm mt-1">160 Courses Found - Status: Online</p>
            </div>
            <div id="action-btn"></div>
        </header>

        <div id="main-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            <div class="col-span-full py-20 text-center">
                <div class="animate-spin w-10 h-10 border-4 border-yellow-400 border-t-transparent rounded-full mx-auto mb-4"></div>
                <p>Establishing Connection...</p>
            </div>
        </div>
    </div>

    <script>
        const API = "https://rahul-backend-7ag5.onrender.com";
        let lastBatchId = "";

        async function loadBatches() {
            const grid = document.getElementById('main-grid');
            console.log("Fetching all batches...");
            try {
                const res = await fetch(`${API}/api/batches`);
                const data = await res.json();
                
                if(!data || data.length === 0) {
                    grid.innerHTML = `<div class="col-span-full p-10 bg-slate-800 rounded-2xl text-center">Backend is syncing... wait 30s.</div>`;
                    return;
                }

                grid.innerHTML = data.map(b => `
                    <div onclick="openBatch('${b.batchId}')" class="card rounded-2xl overflow-hidden cursor-pointer group">
                        <img src="${b.batchImage}" class="w-full h-40 object-cover group-hover:scale-105 transition-transform">
                        <div class="p-4 uppercase">
                            <h3 class="font-bold text-xs h-8 line-clamp-2">${b.batchName}</h3>
                            <p class="text-yellow-500 text-[10px] mt-2 font-black">${b.byName || 'RAHUL MAIDA'}</p>
                        </div>
                    </div>
                `).join('');
                lucide.createIcons();
            } catch (e) { grid.innerHTML = "Server Error"; }
        }

        async function openBatch(id) {
            lastBatchId = id;
            const grid = document.getElementById('main-grid');
            grid.innerHTML = `<div class="col-span-full py-20 text-center"><p class="animate-bounce">Opening Batch Materials...</p></div>`;
            
            console.log("Opening Details for:", id);
            try {
                const res = await fetch(`${API}/api/details/${id}`);
                const resData = await res.json();
                
                // Handling different data structures
                const subjects = resData.data.subjects || resData.data || [];

                document.getElementById('title').innerText = "Subjects";
                document.getElementById('action-btn').innerHTML = `<button onclick="location.reload()" class="bg-white text-black px-4 py-2 rounded-xl font-bold text-xs uppercase">← Back</button>`;

                if(subjects.length === 0) {
                    grid.innerHTML = `<div class="col-span-full p-10 text-center">No subjects found in this batch.</div>`;
                    return;
                }

                grid.innerHTML = subjects.map(s => `
                    <div onclick="openContent('${id}', '${s.subjectId}', '${s.subjectName}')" class="card p-6 rounded-2xl cursor-pointer flex items-center gap-4">
                        <div class="bg-yellow-400 text-black p-3 rounded-xl"><i data-lucide="folder"></i></div>
                        <span class="font-bold text-sm truncate">${s.subjectName}</span>
                    </div>
                `).join('');
                lucide.createIcons();
            } catch (e) { 
                console.error(e);
                alert("Failed to load subjects. Error: " + e.message);
                location.reload();
            }
        }

        async function openContent(bid, sid, sname) {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = `<div class="col-span-full py-20 text-center"><p>Loading Lectures...</p></div>`;
            
            try {
                const res = await fetch(`${API}/api/content/${bid}/${sid}`);
                const resData = await res.json();
                const content = resData.data || [];

                document.getElementById('title').innerText = sname;
                document.getElementById('action-btn').innerHTML = `<button onclick="openBatch('${bid}')" class="bg-white text-black px-4 py-2 rounded-xl font-bold text-xs uppercase">← Back to Subjects</button>`;

                if(content.length === 0) {
                    grid.innerHTML = `<div class="col-span-full p-10 text-center">No content available here.</div>`;
                    return;
                }

                grid.innerHTML = content.map(item => `
                    <div class="card p-5 rounded-3xl flex flex-col justify-between">
                        <div>
                            <div class="text-yellow-400 mb-2"><i data-lucide="${item.url.includes('.pdf') ? 'file-text' : 'play-circle'}"></i></div>
                            <h4 class="text-sm font-bold line-clamp-2">${item.title}</h4>
                        </div>
                        <a href="${item.url}" target="_blank" class="mt-4 block text-center bg-slate-700 hover:bg-yellow-400 hover:text-black py-3 rounded-xl text-[10px] font-black transition-all">
                            OPEN DATA
                        </a>
                    </div>
                `).join('');
                lucide.createIcons();
            } catch (e) { alert("Content Error"); }
        }

        window.onload = loadBatches;
    </script>
</body>
</html>
