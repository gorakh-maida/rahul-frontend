<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rahul Maida Study Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .loader { border-top-color: #fbbf24; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-[#0f172a] text-white font-sans min-h-screen">
    <div class="flex">
        <!-- Sidebar -->
        <div class="w-64 h-screen bg-[#070a16] border-r border-white/10 fixed p-5 flex flex-col justify-between hidden md:flex">
            <div>
                <h2 class="text-2xl font-bold text-yellow-400">Rahul Maida</h2>
                <p class="text-[10px] uppercase tracking-widest text-slate-500">Official Portal</p>
                <nav class="mt-10 space-y-4">
                    <button onclick="showBatches()" class="w-full flex items-center gap-3 text-yellow-400 bg-yellow-400/10 p-3 rounded-lg hover:bg-yellow-400/20 transition">
                        <i data-lucide="layout-dashboard"></i> Batches
                    </button>
                </nav>
            </div>
            <a href="https://t.me/official_rahulmaida" target="_blank" class="bg-[#229ED9] p-3 rounded-xl flex items-center justify-center gap-2 font-bold hover:scale-105 transition">
                <i data-lucide="send"></i> Join Telegram
            </a>
        </div>

        <!-- Main Content -->
        <div class="md:ml-64 p-4 md:p-8 w-full">
            <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                <div id="header-title">
                    <h1 class="text-3xl font-bold">All Batches</h1>
                    <p class="text-slate-400">Welcome back to Rahul Maida Portal</p>
                </div>
                <div class="flex gap-2 w-full md:w-auto">
                    <div id="back-btn-container"></div>
                    <input type="text" id="search" onkeyup="filterBatches()" placeholder="Search batches..." class="bg-slate-800 border border-white/10 p-3 rounded-xl w-full">
                </div>
            </header>

            <!-- Grid Container -->
            <div id="content-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                <!-- Data will load here -->
                <div class="col-span-full flex flex-col items-center justify-center py-20">
                    <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-700 h-12 w-12 mb-4"></div>
                    <p class="text-slate-400">Updating Rahul Maida's Server...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // YAHAN APNA RENDER LINK DALO
        const API_BASE = "https://rahul-backend-7ag5.onrender.com";
        
        let allBatches = [];

        async function loadBatches() {
            try {
                const res = await fetch(`${API_BASE}/api/batches`);
                allBatches = await res.json();
                renderBatches(allBatches);
            } catch (err) {
                showError("Could not connect to Rahul Maida API.");
            }
        }

        function renderBatches(data) {
            document.getElementById('header-title').innerHTML = `<h1 class="text-3xl font-bold">All Batches</h1><p class="text-slate-400">Total ${data.length} Batches Available</p>`;
            document.getElementById('back-btn-container').innerHTML = '';
            
            const grid = document.getElementById('content-container');
            grid.innerHTML = data.map(batch => `
                <div onclick="openBatch('${batch.batchId}')" class="group bg-slate-900 border border-white/10 rounded-2xl overflow-hidden hover:border-yellow-400 transition cursor-pointer shadow-lg">
                    <div class="relative overflow-hidden">
                        <img src="${batch.batchImage}" class="w-full h-44 object-cover group-hover:scale-105 transition duration-500">
                        <div class="absolute top-2 right-2 bg-yellow-400 text-black text-[10px] font-bold px-2 py-1 rounded">RAHUL MAIDA</div>
                    </div>
                    <div class="p-4">
                        <h3 class="font-bold text-md mb-1 line-clamp-1">${batch.batchName}</h3>
                        <p class="text-xs text-slate-500 mb-4">${batch.byName}</p>
                        <button class="w-full bg-slate-800 group-hover:bg-yellow-400 group-hover:text-black py-2 rounded-lg font-bold text-sm transition">View Content</button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        async function openBatch(batchId) {
            scroll(0,0);
            document.getElementById('content-container').innerHTML = '<div class="col-span-full text-center py-20 text-slate-400">Fetching Subjects...</div>';
            
            try {
                const res = await fetch(`${API_BASE}/api/batch-info?batchId=${batchId}&type=subject`);
                const data = await res.json();
                renderSubjects(data.data, batchId);
            } catch (err) {
                showError("Content loading failed.");
            }
        }

        function renderSubjects(subjects, batchId) {
            document.getElementById('header-title').innerHTML = `<h1 class="text-3xl font-bold">Subjects</h1><p class="text-slate-400">Select a subject to see videos</p>`;
            document.getElementById('back-btn-container').innerHTML = `<button onclick="showBatches()" class="bg-slate-700 px-4 py-2 rounded-xl flex items-center gap-2 hover:bg-slate-600 font-bold mb-4 md:mb-0"><i data-lucide="arrow-left"></i> Back</button>`;
            
            const grid = document.getElementById('content-container');
            grid.innerHTML = subjects.map(sub => `
                <div onclick="openContent('${batchId}', '${sub.subjectId}')" class="flex items-center gap-4 bg-slate-900 border border-white/10 p-4 rounded-xl hover:border-yellow-400 cursor-pointer transition">
                    <div class="bg-yellow-400/10 p-3 rounded-lg text-yellow-400">
                        <i data-lucide="folder"></i>
                    </div>
                    <h3 class="font-bold truncate">${sub.subjectName}</h3>
                </div>
            `).join('');
            lucide.createIcons();
        }

        async function openContent(batchId, subjectId) {
            document.getElementById('content-container').innerHTML = '<div class="col-span-full text-center py-20 text-slate-400">Loading Content...</div>';
            
            try {
                // Fetching contents (videos/notes)
                const res = await fetch(`${API_BASE}/api/batch-info?batchId=${batchId}&type=subjectId&subjectId=${subjectId}`);
                // Note: OmniStudy API might require different type for folders, but proxy handles it.
                const data = await res.json();
                renderFinalContent(data.data);
            } catch (err) {
                showError("Could not fetch videos.");
            }
        }

        function renderFinalContent(contents) {
            const grid = document.getElementById('content-container');
            if(!contents || contents.length === 0) {
                grid.innerHTML = '<div class="col-span-full text-center py-20 text-slate-500 italic">No videos or files found in this section.</div>';
                return;
            }

            grid.innerHTML = contents.map(item => {
                const isVideo = item.type === 'video';
                const icon = isVideo ? 'play-circle' : 'file-text';
                const color = isVideo ? 'text-blue-400' : 'text-green-400';

                return `
                    <div class="bg-slate-900 border border-white/10 p-4 rounded-xl flex flex-col justify-between">
                        <div class="flex items-start gap-3">
                            <i data-lucide="${icon}" class="${color} shrink-0"></i>
                            <h3 class="text-sm font-semibold leading-tight">${item.title}</h3>
                        </div>
                        <a href="${item.url}" target="_blank" class="mt-4 block text-center bg-slate-800 hover:bg-white hover:text-black py-2 rounded-lg text-xs font-bold transition">
                           Open ${isVideo ? 'Video' : 'File'}
                        </a>
                    </div>
                `;
            }).join('');
            lucide.createIcons();
        }

        function showBatches() {
            renderBatches(allBatches);
        }

        function filterBatches() {
            const term = document.getElementById('search').value.toLowerCase();
            const filtered = allBatches.filter(b => b.batchName.toLowerCase().includes(term));
            renderBatches(filtered);
        }

        function showError(msg) {
            document.getElementById('content-container').innerHTML = `<div class="col-span-full text-red-400 text-center py-20 p-4 bg-red-400/10 rounded-xl border border-red-400/20">${msg}</div>`;
        }

        loadBatches();
        lucide.createIcons();
    </script>
</body>
</html>
