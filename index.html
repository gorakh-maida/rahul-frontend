<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rahul Maida - Study Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); }
        .course-card:hover { transform: translateY(-5px); border-color: #facc15; }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-200 min-h-screen font-sans">

    <!-- Sidebar (Desktop) -->
    <div class="fixed left-0 top-0 h-full w-64 bg-[#020617] border-r border-white/5 hidden md:flex flex-col p-6 z-50">
        <h1 class="text-2xl font-black text-yellow-400">RAHUL <span class="text-white">MAIDA</span></h1>
        <nav class="mt-10 space-y-2">
            <button onclick="location.reload()" class="w-full flex items-center gap-3 bg-yellow-400/10 text-yellow-400 p-3 rounded-xl border border-yellow-400/20">
                <i data-lucide="layout-grid"></i> All Batches
            </button>
        </nav>
        <div class="mt-auto">
            <a href="https://t.me/official_rahulmaida" target="_blank" class="w-full flex items-center justify-center gap-2 bg-[#229ED9] hover:bg-[#1e8ec4] text-white p-3 rounded-xl font-bold transition-all shadow-lg shadow-[#229ED9]/20">
                <i data-lucide="send"></i> Join Telegram
            </a>
        </div>
    </div>

    <!-- Main Content -->
    <div class="md:ml-64 p-4 md:p-8">
        <header class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-10">
            <div>
                <h2 id="title-main" class="text-3xl font-bold text-white mb-1">Available Batches</h2>
                <p id="sub-main" class="text-slate-400 text-sm">Explore your courses and start learning</p>
            </div>
            <div id="header-action"></div>
        </header>

        <div id="main-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- Loading State -->
            <div id="loader" class="col-span-full py-24 text-center">
                <div class="animate-spin w-12 h-12 border-4 border-yellow-400 border-t-transparent rounded-full mx-auto mb-6"></div>
                <h3 class="text-xl font-medium text-white">Connecting to Server...</h3>
                <p class="text-slate-500 mt-2">Render might take 30-60 seconds to wake up on first load.</p>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "https://rahul-backend-7ag5.onrender.com";
        let activeBatchId = "";

        // 1. Load Batches
        async function loadBatches() {
            try {
                console.log("Fetching batches from:", `${API_BASE}/api/batches`);
                const res = await fetch(`${API_BASE}/api/batches`);
                const rawData = await res.json();
                
                console.log("API Response Received:", rawData);

                // Handling both formats: [array] or { "data": [array] }
                const batches = Array.isArray(rawData) ? rawData : (rawData.data || []);
                renderBatches(batches);
            } catch (err) {
                console.error("Fetch Error:", err);
                showError("Could not reach backend. Please try refreshing after 30 seconds.");
            }
        }

        // 2. Render Cards
        function renderBatches(batches) {
            const grid = document.getElementById('main-grid');
            
            if (batches.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full py-16 text-center bg-yellow-400/5 border border-yellow-400/10 rounded-3xl">
                        <i data-lucide="refresh-cw" class="w-12 h-12 text-yellow-400 mx-auto mb-4 animate-spin"></i>
                        <h3 class="text-xl font-bold text-white mb-2">Syncing Data...</h3>
                        <p class="text-slate-400 px-6">Database is being updated. Wait 10 seconds and Refresh.</p>
                        <button onclick="location.reload()" class="mt-6 bg-yellow-400 text-black px-8 py-3 rounded-xl font-bold">Refresh Now</button>
                    </div>`;
                lucide.createIcons();
                return;
            }

            grid.innerHTML = batches.map(b => `
                <div onclick="openBatch('${b.batchId}')" class="course-card bg-[#1e293b] border border-white/5 rounded-2xl overflow-hidden cursor-pointer shadow-2xl transition-all group">
                    <img src="${b.batchImage}" class="w-full h-40 object-cover group-hover:scale-110 transition-transform duration-500" onerror="this.src='https://placehold.co/400?text=Course'">
                    <div class="p-4">
                        <h3 class="text-white font-bold text-sm line-clamp-2 h-10 mb-2">${b.batchName}</h3>
                        <p class="text-[10px] text-yellow-400 font-bold uppercase">${b.byName || 'RAHUL MAIDA'}</p>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        // 3. Open Batch (Subjects)
        async function openBatch(id) {
            activeBatchId = id;
            document.getElementById('main-grid').innerHTML = '<div class="col-span-full py-20 text-center"><div class="animate-spin w-8 h-8 border-4 border-yellow-400 border-t-transparent rounded-full mx-auto mb-4"></div><p>Loading Subjects...</p></div>';
            
            try {
                const res = await fetch(`${API_BASE}/api/details/${id}`);
                const response = await res.json();
                const subjects = response.data?.subjects || [];

                document.getElementById('title-main').innerText = "Subjects";
                document.getElementById('header-action').innerHTML = `<button onclick="location.reload()" class="bg-slate-800 px-4 py-2 rounded-lg text-sm flex items-center gap-2"><i data-lucide="arrow-left" class="w-4 h-4"></i> Back</button>`;
                
                const grid = document.getElementById('main-grid');
                if(subjects.length === 0) {
                    grid.innerHTML = '<p class="col-span-full text-center py-10">No subjects found for this batch.</p>';
                } else {
                    grid.innerHTML = subjects.map(s => `
                        <div onclick="openContent('${s.subjectId}', '${s.subjectName.replace(/'/g, "")}')" class="bg-[#1e293b] p-5 rounded-2xl border border-white/5 hover:border-yellow-400 cursor-pointer flex items-center gap-4 transition-all">
                            <div class="w-10 h-10 bg-yellow-400/10 rounded-lg flex items-center justify-center text-yellow-400"><i data-lucide="folder"></i></div>
                            <h3 class="font-bold text-sm text-white">${s.subjectName}</h3>
                        </div>
                    `).join('');
                }
                lucide.createIcons();
            } catch (err) { alert("Error loading subjects"); location.reload(); }
        }

        // 4. Open Content (Videos/PDFs)
        async function openContent(subId, subName) {
            document.getElementById('main-grid').innerHTML = '<div class="col-span-full py-20 text-center"><div class="animate-spin w-8 h-8 border-4 border-yellow-400 border-t-transparent rounded-full mx-auto mb-4"></div><p>Loading Content...</p></div>';
            try {
                const res = await fetch(`${API_BASE}/api/content/${activeBatchId}/${subId}`);
                const response = await res.json();
                const content = response.data || [];

                document.getElementById('title-main').innerText = subName;
                document.getElementById('header-action').innerHTML = `<button onclick="openBatch('${activeBatchId}')" class="bg-slate-800 px-4 py-2 rounded-lg text-sm flex items-center gap-2"><i data-lucide="arrow-left" class="w-4 h-4"></i> Back to Subjects</button>`;

                const grid = document.getElementById('main-grid');
                grid.innerHTML = content.map(item => `
                    <div class="bg-[#1e293b] p-4 rounded-xl border border-white/5">
                        <h4 class="text-white text-xs font-bold mb-3 line-clamp-2">${item.title}</h4>
                        <a href="${item.url}" target="_blank" class="block w-full text-center bg-yellow-400 text-black py-2 rounded-lg font-bold text-[10px] uppercase">
                            Open ${item.url.includes('.pdf') ? 'PDF' : 'Video'}
                        </a>
                    </div>
                `).join('');
                lucide.createIcons();
            } catch (err) { alert("Error loading content"); }
        }

        function showError(msg) {
            document.getElementById('main-grid').innerHTML = `
                <div class="col-span-full py-10 text-center bg-red-500/10 border border-red-500/20 rounded-2xl">
                    <p class="text-red-400 font-bold">${msg}</p>
                    <button onclick="loadBatches()" class="mt-4 bg-red-500 text-white px-6 py-2 rounded-lg">Retry Now</button>
                </div>`;
        }

        document.addEventListener('DOMContentLoaded', loadBatches);
    </script>
</body>
</html>
