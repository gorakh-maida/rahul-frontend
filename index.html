<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rahul Maida Study - Live</title>
    <!-- Fixed Tailwind Warning (Using official CSS instead of script) -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Dummy Favicon to stop 404 error -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎓</text></svg>">
    
    <style>
        :root { --gold: #f59e0b; --bg: #0d0d0e; }
        body { background: var(--bg); color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow-x: hidden; }
        .glass-card { background: #161618; border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .glass-card:hover { border-color: var(--gold); transform: translateY(-5px); box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .online { background: #10b981; box-shadow: 0 0 10px #10b981; }
        .loading-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>
</head>
<body class="p-6 md:p-12">
    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-16 gap-4">
            <div>
                <h1 class="text-5xl font-black italic tracking-tighter">RAHUL <span class="text-amber-500">MAIDA</span></h1>
                <div class="mt-2 flex items-center">
                    <span id="dot" class="status-dot online"></span>
                    <span id="status-text" class="text-[10px] uppercase font-bold tracking-widest text-zinc-500">System Standby</span>
                </div>
            </div>
            <div id="nav-btn"></div>
        </header>

        <div id="root" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="col-span-full py-20 text-center">
                <div class="loading-pulse text-amber-500 font-bold tracking-tighter text-2xl uppercase">Initializing Live Proxy...</div>
                <p class="text-zinc-600 text-sm mt-4">Ye process pehli baar mein 30-40 seconds le sakta hai (Render logic).</p>
            </div>
        </div>
    </div>

    <script>
        // AAPKA RENDER URL YAHAN CHECK KAREIN
        const API = "https://rahul-backend-7ag5.onrender.com";

        async function loadBatches() {
            const root = document.getElementById('root');
            const status = document.getElementById('status-text');
            status.innerText = "Attempting Authentication Bypass...";

            try {
                const res = await fetch(`${API}/api/batches`);
                if(!res.ok) throw new Error("Backend Offline");
                
                const data = await res.json();
                status.innerText = "Verified • Live Sync Active";
                
                if(data.length === 0) {
                    root.innerHTML = `<div class="col-span-full text-center py-20 text-zinc-500">No Batches Found. Check your Token.</div>`;
                    return;
                }

                root.innerHTML = data.map(b => `
                    <div onclick="openBatch('${b.batchId || b._id}')" class="glass-card p-5 cursor-pointer group">
                        <img src="${b.batchImage}" class="w-full h-48 object-cover rounded-2xl mb-4 group-hover:opacity-80 transition-opacity">
                        <h3 class="font-bold text-lg mb-4 line-clamp-2">${b.batchName}</h3>
                        <div class="flex justify-between items-center text-amber-500 font-bold text-xs uppercase tracking-widest">
                            <span>View Subjects</span>
                            <i data-lucide="arrow-right-circle"></i>
                        </div>
                    </div>
                `).join('');
                lucide.createIcons();
            } catch (err) {
                status.innerText = "Connection Failed • Refreshing...";
                root.innerHTML = `<div class="col-span-full text-center py-20">
                    <p class="text-red-500 font-bold">Error: Backend is sleeping.</p>
                    <button onclick="location.reload()" class="mt-4 bg-white text-black px-8 py-3 rounded-full font-bold">CLICK TO WAKE UP SERVER</button>
                </div>`;
            }
        }

        async function openBatch(bid) {
            const root = document.getElementById('root');
            root.innerHTML = `<div class="col-span-full py-40 text-center animate-pulse font-bold text-amber-500">SYNCING LIVE MODULES...</div>`;
            
            try {
                const res = await fetch(`${API}/api/details/${bid}`);
                const resData = await res.json();
                const subjects = resData.data.subjects || [];

                document.getElementById('nav-btn').innerHTML = `<button onclick="location.reload()" class="border-2 border-amber-500 text-amber-500 px-8 py-3 rounded-full font-bold text-xs uppercase tracking-widest hover:bg-amber-500 hover:text-black transition-all">Back Home</button>`;

                root.innerHTML = subjects.map(s => `
                    <div onclick="openContent('${bid}', '${s.subjectId || s._id}')" class="glass-card p-10 flex flex-col items-center justify-center gap-6 text-center cursor-pointer">
                        <div class="bg-amber-500/10 p-6 rounded-3xl text-amber-500"><i data-lucide="book-open" class="w-10 h-10"></i></div>
                        <span class="font-black text-sm uppercase tracking-tighter">${s.subjectName || s.name}</span>
                    </div>
                `).join('');
                lucide.createIcons();
            } catch(e) { console.error(e); }
        }

        async function openContent(bid, sid) {
            const root = document.getElementById('root');
            root.innerHTML = `<div class="col-span-full py-40 text-center">Opening Library...</div>`;

            try {
                const res = await fetch(`${API}/api/content/${bid}/${sid}`);
                const resData = await res.json();
                const content = resData.data || [];

                root.innerHTML = content.map(item => `
                    <div class="glass-card p-6 flex flex-col justify-between group">
                        <div>
                            <div class="text-[10px] font-bold text-zinc-500 mb-2 uppercase tracking-widest">Rahul Maida Proxy</div>
                            <h4 class="font-bold text-sm leading-relaxed">${item.title}</h4>
                        </div>
                        <a href="${item.url}" target="_blank" class="mt-10 block text-center bg-amber-500 text-black py-4 rounded-2xl font-black text-xs uppercase tracking-tighter shadow-lg shadow-amber-500/10 active:scale-95 transition-all">Watch Now</a>
                    </div>
                `).join('');
                lucide.createIcons();
            } catch(e) { console.error(e); }
        }

        window.onload = loadBatches;
    </script>
</body>
</html>
