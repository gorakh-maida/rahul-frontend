<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rahul Maida - Study Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .batch-card { background: #0f172a; border: 1px solid #1e293b; transition: 0.3s; }
        .batch-card:hover { border-color: #facc15; transform: translateY(-4px); }
        .loader { width: 48px; height: 48px; border: 5px solid #FFF; border-bottom-color: #facc15; border-radius: 50%; display: inline-block; animation: rotation 1s linear infinite; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen p-4 md:p-10">

    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-12 border-b border-white/5 pb-6">
            <div>
                <h1 onclick="location.reload()" class="text-3xl font-black text-white cursor-pointer tracking-tight">RAHUL <span class="text-yellow-400">MAIDA</span></h1>
                <p id="status-text" class="text-[10px] text-slate-500 font-bold uppercase mt-1 tracking-widest">Portal Version 2.0 - Online</p>
            </div>
            <div id="nav-btn"></div>
        </header>

        <div id="root" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            <!-- Initial Loader -->
            <div class="col-span-full py-20 text-center">
                <span class="loader"></span>
                <p class="mt-4 text-slate-400 font-medium">Connecting to Secure Server...</p>
            </div>
        </div>
    </div>

    <script>
        const API = "https://rahul-backend-7ag5.onrender.com";

        async function init() {
            try {
                const res = await fetch(`${API}/api/batches`);
                const data = await res.json();
                const root = document.getElementById('root');
                
                if(!data || data.length === 0) {
                    root.innerHTML = `<div class="col-span-full py-20 text-center">
                        <p class="text-red-400 mb-4">No data received from backend.</p>
                        <button onclick="init()" class="bg-yellow-400 text-black px-6 py-2 rounded-full font-bold">RETRY SYNC</button>
                    </div>`;
                    return;
                }

                root.innerHTML = data.map(b => `
                    <div onclick="openBatch('${b.batchId}')" class="batch-card rounded-3xl overflow-hidden cursor-pointer shadow-lg">
                        <img src="${b.batchImage}" class="w-full h-44 object-cover">
                        <div class="p-5">
                            <h3 class="text-sm font-bold h-10 line-clamp-2 leading-tight">${b.batchName}</h3>
                            <p class="text-[10px] text-yellow-500 font-black uppercase mt-3 tracking-widest">${b.byName || 'Rahul Maida'}</p>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                document.getElementById('root').innerHTML = "Server Down. Please check Render Dashboard.";
            }
        }

        async function openBatch(bid) {
            const root = document.getElementById('root');
            root.innerHTML = `<div class="col-span-full py-20 text-center"><span class="loader"></span><p class="mt-4 text-yellow-400 font-bold">DECRYPTING SUBJECTS...</p></div>`;
            
            try {
                const res = await fetch(`${API}/api/details/${bid}`);
                const resData = await res.json();
                
                // Flexible data detection
                let subjects = (resData.data && resData.data.subjects) ? resData.data.subjects : (Array.isArray(resData.data) ? resData.data : []);

                document.getElementById('nav-btn').innerHTML = `<button onclick="location.reload()" class="bg-white text-black px-6 py-2 rounded-xl font-bold text-xs">BACK HOME</button>`;

                if (subjects.length === 0) {
                    root.innerHTML = `<div class="col-span-full py-20 text-center bg-slate-900 rounded-3xl border border-white/5">
                        <p class="text-xl font-bold mb-2">Notice: Batch Empty</p>
                        <p class="text-slate-500 text-sm mb-6">Source returned 0 subjects for this ID.</p>
                        <button onclick="openBatch('${bid}')" class="text-yellow-400 font-bold underline">Try Once More</button>
                    </div>`;
                    return;
                }

                root.innerHTML = subjects.map(s => `
                    <div onclick="openContent('${bid}', '${s.subjectId}')" class="batch-card p-6 rounded-3xl flex items-center gap-4 cursor-pointer hover:bg-slate-800">
                        <div class="bg-yellow-400/10 p-3 rounded-2xl text-yellow-400"><i data-lucide="folder"></i></div>
                        <span class="font-bold text-sm truncate">${s.subjectName}</span>
                    </div>
                `).join('');
                lucide.createIcons();
            } catch(e) { 
                root.innerHTML = "Error loading subjects."; 
            }
        }

        async function openContent(bid, sid) {
            const root = document.getElementById('root');
            root.innerHTML = "<div class='col-span-full py-20 text-center'><span class='loader'></span></div>";

            try {
                const res = await fetch(`${API}/api/content/${bid}/${sid}`);
                const data = await res.json();
                const content = data.data || [];

                document.getElementById('nav-btn').innerHTML = `<button onclick="openBatch('${bid}')" class="bg-white text-black px-6 py-2 rounded-xl font-bold text-xs">BACK TO SUBJECTS</button>`;

                if (content.length === 0) {
                    root.innerHTML = "<div class='col-span-full py-20 text-center text-slate-500'>Empty Subject Folder.</div>";
                    return;
                }

                root.innerHTML = content.map(item => `
                    <div class="batch-card p-5 rounded-3xl flex flex-col justify-between h-full bg-gradient-to-b from-slate-800 to-slate-900 border-none shadow-xl">
                        <div>
                            <div class="text-yellow-400 mb-4"><i data-lucide="${item.url.includes('.pdf') ? 'file-text' : 'play-circle'}" class="w-8 h-8"></i></div>
                            <h4 class="text-xs font-bold line-clamp-3 mb-4 leading-relaxed">${item.title}</h4>
                        </div>
                        <a href="${item.url}" target="_blank" class="block w-full text-center bg-yellow-400 text-black py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest hover:scale-105 transition-all">OPEN NOW</a>
                    </div>
                `).join('');
                lucide.createIcons();
            } catch(e) { root.innerHTML = "Error loading content."; }
        }

        window.onload = init;
    </script>
</body>
</html>
